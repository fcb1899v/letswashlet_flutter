plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
    id "com.google.gms.google-services"
    id "com.google.firebase.crashlytics"
}

def kotlin_version = "2.2.0"
def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

def flutterVersionCode = localProperties.getProperty('flutter.versionCode')
if (flutterVersionCode == null) {
    flutterVersionCode = '1'
}

def flutterVersionName = localProperties.getProperty('flutter.versionName')
if (flutterVersionName == null) {
    flutterVersionName = '1.0'
}

def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file('key.properties')
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

android {

    compileSdkVersion 36
    ndkVersion "27.0.12077973"
    namespace "nakajimamasao.appstudio.letswashlet"

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = '17'
    }

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }

    defaultConfig {
        applicationId "nakajimamasao.appstudio.letswashlet"
        minSdkVersion flutter.minSdkVersion
        targetSdkVersion 36
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName
    }

    signingConfigs {
        release {
            keyAlias keystoreProperties['keyAlias']
            keyPassword keystoreProperties['keyPassword']
            storeFile keystoreProperties['storeFile'] ? file(keystoreProperties['storeFile']) : null
            storePassword keystoreProperties['storePassword']
        }
    }

    buildTypes {
        release {
            signingConfig signingConfigs.release
        }
    }
}

flutter {
    source '../..'
}

// Exclude deprecated play-services-safetynet; use Play Integrity API instead
configurations.all {
    exclude group: 'com.google.android.gms', module: 'play-services-safetynet'
}

def flutterSdkPath = localProperties.getProperty("flutter.sdk")
def flutterJar = flutterSdkPath != null ? file("${flutterSdkPath}/bin/cache/artifacts/engine/android-arm64-release/flutter.jar") : null

dependencies {
    // IDE の参照解決用（FlutterActivity 等）。実行時は Flutter プラグインが提供するため compileOnly
    if (flutterJar != null && flutterJar.exists()) {
        compileOnly files(flutterJar)
    }
    implementation "org.jetbrains.kotlin:kotlin-stdlib-jdk7:$kotlin_version"
    implementation "androidx.core:core-ktx:1.17.0"
    implementation platform('com.google.firebase:firebase-bom:34.10.0')
    implementation 'com.google.firebase:firebase-analytics'
    implementation("com.google.firebase:firebase-appcheck:19.0.2") {
        exclude group: "com.google.firebase", module: "firebase-appcheck-safetynet"
    }
    implementation "com.google.firebase:firebase-appcheck-playintegrity:19.0.2"
    implementation 'com.google.android.play:integrity:1.6.0'
}
