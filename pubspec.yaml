name: letswashlet
description: washlet simulator.
publish_to: 'none'
version: 1.1.6+16

environment:
  sdk: '>=2.18.0 <4.0.0'
  flutter: '>=3.3.0'
dependencies:
  flutter:
    sdk: flutter
  webview_flutter_android: ^4.3.1
  webview_flutter: ^4.10.0
  # Firebase Analytics
  firebase_core: ^3.11.0
  firebase_analytics: ^11.4.2
  firebase_app_check: ^0.3.2+2
  # App Icon
  cupertino_icons: ^1.0.8
  flutter_launcher_icons: ^0.14.3
  # Audio Player
  audioplayers: ^6.2.0
  # Vibration
  vibration: ^3.1.3
  # Admob
  google_mobile_ads: ^5.3.1
  app_tracking_transparency: ^2.0.6+1
  #env
  flutter_dotenv: ^5.2.1
  #MVVM
  hooks_riverpod: ^2.6.1
  flutter_hooks: ^0.20.5
  # Localize
  flutter_localizations:
    sdk: flutter
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

  # App Splash
  flutter_native_splash: ^2.4.4

flutter_icons:
  image_path: "assets/images/icon.png"
  android: true
  ios: true
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "assets/images/appIcon.png"

flutter_native_splash:
  image: "assets/images/icon.png"
  color: "#ffffff"

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/images/
    - assets/audios/
    - assets/.env

  fonts:
    - family: roboto
      fonts:
        - asset: assets/fonts/Roboto-Regular.ttf
    - family: cornerStone
      fonts:
        - asset: assets/fonts/cornerstone.ttf




